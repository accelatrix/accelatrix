  <h1>Tests</h1>
  <p>
    <input type="number" id="Population" value="1000"><button onclick="GenPopulationClick()">generate population</button>
  </p>
  <p>
    <button onclick="RunTest(1)">Test-case #1</button>
    <button onclick="RunTest(2)">Test-case #2</button>
    <button onclick="RunTest(3)">Test-case #3</button>
    <button onclick="RunTest(4)">Test-case #4</button>
    <button onclick="RunTest(5)">Test-case #5</button>
  </p>


  <h1>Result</h1>
  <div id="Result">

  </div>
</body>

<script>
  function Reload()
  {
     document.location.href = document.location.href.split("?")[0] + "?" + (new Date()).getTime().toString();
  }

  function WarmUp(callback)
  {
      var container = document.getElementById("Result");
      container.innerHTML = "<p>Warm-up workers</p>"
            
      self["testData"] = GenPopulation(1000);

      TestCases.TestCase2(self["testData"], () =>
      {
         container.innerHTML = "<p>Warm-up workers</p><p>Warm-up complete</p>"
         if (callback != null)
            callback();
      })
  }

  function GenPopulationClick()
  {
      if (self["Accelatrix"] == null)
      {
          var script = document.createElement("script");
          script.src = "https://ferreira-family.org/accelatrix/accelatrix.min.js"
          document.head.appendChild(script);
      }
      if (self["testData"] == null)
      {
          WarmUp(GenPopulationClick);
          return;
      }

      var popSize = Number(document.getElementById("Population").value);
      self["testData"] = GenPopulation(popSize);

      document.getElementById("Result").innerHTML += '<p><b>Population size:</b> ' + popSize.ToString() + '</p>';
  }

  function RunTest(caseNumber, callback)
  {
     var container = document.getElementById("Result");

     container.innerHTML += "<br>Test-case #" + caseNumber.toString();

     TestCases["TestCase" + caseNumber](self["testData"], (simple, clone, serialized) =>
     {
        container.innerHTML += "<br><b>Simple: </b>" + simple.ToString() + "<br><b>Clone: </b>" + clone.ToString() + "<br><b>Serialized: </b>" + serialized.ToString() + "<br>";

        if (callback != null)
          setTimeout(callback, 0);
     });
  }


    //Init types
  Accelatrix.Type.LoadedTypes;
  Accelatrix.Tasks.Config.Scripts.push({ SourceType: Accelatrix.Tasks.TaskScriptSource.Url, Contents: "tests.js?" + (new Date()).getTime().toString()})
</script>
